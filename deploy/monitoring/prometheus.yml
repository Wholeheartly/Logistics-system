global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alerts.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

scrape_configs:
  - job_name: "logistics-backend"
    metrics_path: "/api/health"
    static_configs:
      - targets: ["backend:8000"]
        labels:
          service: "logistics-api"

  - job_name: "nginx"
    static_configs:
      - targets: ["nginx-exporter:9113"]
        labels:
          service: "nginx"

  - job_name: "postgres"
    static_configs:
      - targets: ["postgres-exporter:9187"]
        labels:
          service: "postgresql"

  - job_name: "node"
    static_configs:
      - targets: ["node-exporter:9100"]
        labels:
          service: "server"
